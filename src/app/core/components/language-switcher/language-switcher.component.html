<div class="switcher-container" (click)="toggleLangsList()">
    <button class="my-btn">
        <i class="bi bi-globe globe-icon"></i>
        {{lang | uppercase}}
    </button>
    <ng-container *ngIf="showList">
        <ul class="langs-list">
            <li (click)="switchLanguage('en', $event)">
                <img src="./assets/usa-flag.png" width="16" height="16">
                <span class="lang-txt">EN</span>
            </li>
            <li (click)="switchLanguage('tr', $event)">
                <img src="./assets/tr-flag.png" width="18" height="18">
                <span class="lang-txt">TR</span>
            </li>
        </ul>
    </ng-container>
</div>
