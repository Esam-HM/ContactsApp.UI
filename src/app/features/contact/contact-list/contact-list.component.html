<div class="container">
    <div class="content">
        <!-- Alert Message -->
        <app-alert-message 
            (toggleVisibility)="showAlert = false" 
            [isVisible]="showAlert" 
            [message]="alertMessage"
            [alertType]="alertType"
            class="custom-container">
        </app-alert-message>
        <!-- Spinner -->
        <app-spinner 
            [isVisible]="showSpinner" 
            [message]="spinnerMessage">
        </app-spinner>
        <!-- Confirmation Box -->
        <app-confirmation-modal
            [isVisible]="showConfirmBox"
            [header]="'messages.dltQuesHead' | translate "
            [question]="'messages.dltQues' | translate "
            [btnsText]="boxBtnsText"
            [btnsColor]="['btn-danger','btn-secondary']"
            (confirmedAction)="deleteContact()"
            (canceledAction)="showConfirmBox=false">
        </app-confirmation-modal>
        <!-- Content -->
        <div class="row">
            <h1 class="col-6">{{ 'contact.ContactsList' | translate }}</h1>
            <div class="col-6 d-flex justify-content-end">
                <button class="btn btn-primary" routerLink="/contacts/add">
                    <i class="bi bi-person-fill-add"></i>
                    {{ 'contact.NewContact' | translate }}
                </button>
            </div>
        </div>
        <div class="row mt-4">
            <div class="col-12">
                <div class="d-flex justify-content-center align-items-center">
                    <ag-grid-angular
                        class="ag-grid-container"
                        [gridOptions]="gridOptions"
                        [rowData]="sampleData"
                        (cellMouseOver)="onCellHover($event)"
                        (cellMouseOut)="onCellMouseOut($event)"
                        (gridReady)="onGridReady($event)"                 
                    />
                </div>
            </div>
        </div>
    </div>
</div>
